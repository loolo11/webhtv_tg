name: GitHub Release Monitor

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GITHUB_REPO_URL: 'https://github.com/Silent1566/webhtv'

jobs:
  check-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      # 恢复缓存（如果存在）
      - name: Restore previous state
        uses: actions/cache/restore@v4
        id: restore-cache
        with:
          path: last_release.json
          key: ${{ runner.os }}-monitor-${{ github.repository }}
          fail-on-cache-miss: false

      - name: Create state file if not exists
        run: |
          if [ ! -f last_release.json ]; then
            echo '{"last_tag": null}' > last_release.json
          fi

      # 运行脚本
      - name: Run Monitor Script
        run: python github_release_monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_URL: ${{ env.GITHUB_REPO_URL }}

      # 保存缓存
      - name: Save state to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_release.json
          key: ${{ runner.os }}-monitor-${{ github.repository }}-${{ github.run_number }}
