name: GitHub Release Monitor

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      # 使用更简单的缓存策略
      - name: Restore previous state
        uses: actions/cache/restore@v4
        id: restore-cache
        with:
          path: last_release.json
          key: ${{ runner.os }}-monitor-${{ github.repository }}
          fail-on-cache-miss: false

      - name: Create empty state file if not exists
        run: |
          if [ ! -f last_release.json ]; then
            echo '{"last_tag": null}' > last_release.json
            echo "Created empty state file"
          else
            echo "State file exists:"
            cat last_release.json
          fi

      - name: Run Monitor Script
        env:
          GITHUB_REPO_URL: 'https://github.com/Silent1566/webhtv'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python github_release_monitor.py
        continue-on-error: false

      - name: Save state to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_release.json
          key: ${{ runner.os }}-monitor-${{ github.repository }}-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-monitor-${{ github.repository }}
