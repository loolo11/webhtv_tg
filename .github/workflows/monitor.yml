name: GitHub Release Monitor

on:
  schedule:
    # 每 2 小时运行一次
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5  # 更新到 v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # 使用更新的 Python 版本

      - name: Install dependencies
        run: pip install requests

      # 修复缓存问题 - 使用更可靠的缓存配置
      - name: Restore Cache
        uses: actions/cache@v4
        id: cache-last-release
        with:
          path: last_release.json
          key: ${{ runner.os }}-release-monitor-${{ github.repository }}
          restore-keys: |
            ${{ runner.os }}-release-monitor-${{ github.repository }}
            ${{ runner.os }}-release-monitor-

      - name: Run Monitor Script
        env:
          GITHUB_REPO_URL: 'https://github.com/Silent1566/webhtv'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 如果缓存文件不存在，创建一个空的
          if [ ! -f last_release.json ]; then
            echo '{}' > last_release.json
          fi
          python github_release_monitor.py
          
      # 确保缓存被保存
      - name: Save Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_release.json
          key: ${{ runner.os }}-release-monitor-${{ github.repository }}
