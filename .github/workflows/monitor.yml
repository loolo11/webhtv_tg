name: GitHub Release Monitor

on:
  schedule:
    # 每 2 小时运行一次 (GitHub 的 cron 可能会有几分钟到半小时的延迟)
    - cron: '0 */2 * * *'
  workflow_dispatch: # 允许在网页上手动点击触发

jobs:
  check-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      # 核心：使用 Cache 保存 last_release.json，避免每次运行都重复发送
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: last_release.json
          # 使用文件内容的 hash 作为 key，如果文件更新，会自动生成新 cache
          key: release-monitor-state-${{ hashFiles('last_release.json') }}
          restore-keys: |
            release-monitor-state-

      - name: Run Monitor Script
        env:
          GITHUB_REPO_URL: 'https://github.com/Silent1566/webhtv'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python github_release_monitor.py
